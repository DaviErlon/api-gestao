<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Sistema</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background-color: #2c2c2c;


            background-image:
                linear-gradient(to right, rgba(255, 255, 255, 0.08) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(255, 255, 255, 0.08) 1px, transparent 1px);
            background-size: 50px 50px;

            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', system-ui, -apple-system, 'Roboto', 'Helvetica Neue', sans-serif;
            padding: 1rem;
        }


        .login-card {
            background: white;
            border-radius: 24px;
            box-shadow: 0 25px 45px -12px rgba(0, 0, 0, 0.35), 0 4px 12px rgba(0, 0, 0, 0.1);
            padding: 2rem 2rem 2.5rem 2rem;
            width: 100%;
            max-width: 440px;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .login-card:hover {
            box-shadow: 0 30px 50px -15px rgba(0, 0, 0, 0.4);
        }

        .login-title {
            font-size: 1.9rem;
            font-weight: 600;
            color: #1e1e2f;
            margin-bottom: 0.5rem;
            letter-spacing: -0.3px;
        }

        .login-sub {
            color: #6c6c7a;
            margin-bottom: 2rem;
            font-size: 0.9rem;
            border-left: 3px solid #9b9bff;
            padding-left: 12px;
        }

        .input-group {
            margin-bottom: 1.5rem;
            display: flex;
            flex-direction: column;
        }

        .input-group label {
            font-size: 0.85rem;
            font-weight: 500;
            color: #2d2d3a;
            margin-bottom: 6px;
            letter-spacing: 0.3px;
        }

        .password-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-group input {
            width: 100%;
            padding: 14px 18px;
            font-size: 1rem;
            border: 1.5px solid #e2e2e8;
            border-radius: 18px;
            background-color: #fefefe;
            transition: all 0.25s ease;
            outline: none;
            font-family: inherit;
            color: #14141c;
        }

        .password-wrapper input {
            padding-right: 48px;
        }

        .input-group input:focus {
            border-color: #7c7cff;
            box-shadow: 0 0 0 4px rgba(124, 124, 255, 0.15);
            background-color: #ffffff;
        }

        .input-group input::placeholder {
            color: #b0b0bc;
            font-weight: 400;
            font-size: 0.9rem;
        }

        .toggle-password {
            position: absolute;
            right: 14px;
            background: none;
            border: none;
            cursor: pointer;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 0.2s;
            opacity: 0.6;
        }

        .toggle-password:hover {
            opacity: 1;
        }

        .toggle-password svg {
            width: 22px;
            height: 22px;
            stroke: #5f5f6e;
            stroke-width: 1.8;
            fill: none;
            transition: stroke 0.2s;
        }

        .toggle-password:hover svg {
            stroke: #3a3ad4;
        }

        .login-btn {
            width: 100%;
            background: linear-gradient(135deg, #5f5fef, #3a3ad4);
            border: none;
            padding: 14px 20px;
            border-radius: 40px;
            font-size: 1rem;
            font-weight: 600;
            color: white;
            cursor: pointer;
            transition: all 0.25s ease;
            margin-top: 0.5rem;
            box-shadow: 0 6px 14px rgba(58, 58, 212, 0.25);
            font-family: inherit;
            letter-spacing: 0.5px;
        }

        .login-btn:hover {
            background: linear-gradient(135deg, #4a4ae0, #2b2bb5);
            box-shadow: 0 10px 20px rgba(58, 58, 212, 0.35);
        }

        .login-btn:active {
            transform: scale(0.98);
        }

        /* Responsividade para telas pequenas */
        @media (max-width: 480px) {
            .login-card {
                padding: 1.8rem 1.5rem 2rem 1.5rem;
            }

            .login-title {
                font-size: 1.6rem;
            }

            .input-group input {
                padding: 12px 16px;
            }

            .password-wrapper input {
                padding-right: 44px;
            }

            .toggle-password svg {
                width: 20px;
                height: 20px;
            }
        }

        .message {
            margin-top: 1rem;
            padding: 10px 16px;
            border-radius: 40px;
            font-size: 0.85rem;
            text-align: center;
            font-weight: 500;
            transition: all 0.2s ease;
        }

        .message.error {
            background-color: #ffe6e6;
            color: #c7362b;
            border-left: 4px solid #c7362b;
        }

        .message.success {
            background-color: #e6ffed;
            color: #2c6e3c;
            border-left: 4px solid #2c6e3c;
        }
    </style>
</head>

<body>
    <div class="login-card">
        <div class="login-title">Boas-vindas</div>
        <div class="login-sub">Acesse sua conta</div>

        <form id="loginForm">
            <div class="input-group">
                <label for="email">E-mail</label>
                <input type="email" id="email" name="email" placeholder="seu@email.com" autocomplete="email">
            </div>

            <div class="input-group">
                <label for="senha">Senha</label>
                <div class="password-wrapper">
                    <input type="password" id="senha" name="senha" placeholder="••••••••"
                        autocomplete="current-password">
                    <button type="button" class="toggle-password" id="toggleSenha" aria-label="Mostrar senha">
                        <!-- Ícone de olho (SVG) -->
                        <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                            <circle cx="12" cy="12" r="3" />
                        </svg>
                    </button>
                </div>
            </div>

            <button type="button" class="login-btn" id="btn">Entrar</button>
            <div id="message" class="message"></div>
        </form>
    </div>

    <script src="login.js"></script>
</body>

</html>
