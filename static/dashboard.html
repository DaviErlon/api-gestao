<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Dashboard </title>
    <link rel="stylesheet" href="styles/common.css">
    <link rel="stylesheet" href="styles/dashboard.css">
</head>

<body>
    <div class="top-bar">
        <div class="profile-area">
            <div class="user-avatar" id="userAvatar">U</div>
            <button class="logout-btn" id="logoutBtn">Sair</button>
        </div>
    </div>

    <div class="sidebar" id="sidebar">
        <div class="nav-items">
            <div class="nav-item" data-module="posts">
                <div class="nav-icon">
                    <svg viewBox="0 0 24 24" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z" />
                        <line x1="8" y1="8" x2="16" y2="8" />
                        <line x1="8" y1="12" x2="16" y2="12" />
                        <line x1="8" y1="16" x2="12" y2="16" />
                    </svg>
                </div>
                <span class="nav-text">Posts</span>
            </div>
            <div class="nav-item" data-module="reunioes">
                <div class="nav-icon">
                    <svg viewBox="0 0 24 24" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="3" y="4" width="18" height="18" rx="2" ry="2" />
                        <line x1="16" y1="2" x2="16" y2="6" />
                        <line x1="8" y1="2" x2="8" y2="6" />
                        <line x1="3" y1="10" x2="21" y2="10" />
                        <circle cx="12" cy="15" r="1" />
                        <circle cx="16" cy="15" r="1" />
                        <circle cx="8" cy="15" r="1" />
                    </svg>
                </div>
                <span class="nav-text">Reuniões</span>
            </div>
            <div class="nav-item" data-module="empresas">
                <div class="nav-icon">
                    <svg viewBox="0 0 24 24" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="3" y="7" width="18" height="13" rx="2" ry="2" />
                        <path d="M16 3v4M8 3v4" />
                        <path d="M7 11h10M7 15h6" />
                    </svg>
                </div>
                <span class="nav-text">Empresas</span>
            </div>
            <div class="nav-item" data-module="ciclos">
                <div class="nav-icon">
                    <svg viewBox="0 0 24 24" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
                        <path
                            d="M21 12a9 9 0 0 1-9 9m9-9a9 9 0 0 0-9-9m9 9h-4m-7 9A9 9 0 0 1 3 12m9 9v-4M3 12a9 9 0 0 1 9-9m-9 9h4m7-9a9 9 0 0 1 9 9" />
                    </svg>
                </div>
                <span class="nav-text">Ciclos</span>
            </div>
        </div>
    </div>

    <div class="main-content" id="mainContent"></div>

    <!-- <script src="scripts/index.js"></script> -->
    <script src="scripts/dashboard.js"></script>
</body>

</html>
