<div class="content-card">
    <div class="module-header">
        <div class="module-title">Posts</div>
        <button id="createPostBtn" class="module-btn">Criar Post</button>
    </div>

    <div id="postsContainer"></div>

    <div id="pagination" class="pagination"></div>
</div>

<div id="postModal" class="modal-overlay hidden">
    <div class="modal-card">
        <h3>Criar Post</h3>
        <textarea id="postContent" placeholder="Escreva seu post..."></textarea>

        <div class="modal-actions">
            <button class="modal-cancel" id="cancelPost">Cancelar</button>
            <button class="modal-submit" id="submitPost">Publicar</button>
        </div>
    </div>
</div>
