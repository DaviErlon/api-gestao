<div class="content-card">
    <div class="module-header">
        <div class="module-title">Posts</div>
        <button id="createPostBtn">Criar Post</button>
    </div>

    <div id="postsContainer"></div>

    <div id="pagination" class="pagination"></div>
</div>

<div id="postModal" class="post-modal hidden">
    <div class="post-modal-card">
        <textarea id="postContent" placeholder="Escreva seu post..."></textarea>

        <div class="post-modal-actions">
            <button class="post-modal-cancel" id="cancelPost">Cancelar</button>
            <button class="post-modal-submit" id="submitPost">Publicar</button>
        </div>
    </div>
</div>
